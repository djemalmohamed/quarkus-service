quarkus.http.port=8080
quarkus.http.host=0.0.0.0
quarkus.jackson.fail-on-unknown-properties=false

gateway.outbound.connect-timeout=10S
gateway.outbound.read-timeout=60S

gateway.targets.payment-provider.description=Payment provider endpoint
gateway.targets.payment-provider.base-url=https://provider.example.com/v1/payments-instructions
gateway.targets.payment-provider.method=POST
gateway.targets.payment-provider.headers.Content-Type=application/json
gateway.targets.payment-provider.headers.Requesting-Agent=AGC
gateway.targets.payment-provider.request-signature-endpoint=common-outbound
gateway.targets.payment-provider.response-signature-endpoint=payment-provider-response

agw.connectivity.signature.enabled=true
agw.connectivity.signature.log-validation-details=true

agw.connectivity.signature.ds.trust.ca.path=pki/demo/demo-ca.crt
# agw.connectivity.signature.ds.trust.ca.b64=
agw.connectivity.signature.revocation.enabled=true
agw.connectivity.signature.ds.keys.agc.pkcs12.path=pki/demo/agc-signing-keystore.p12
# agw.connectivity.signature.ds.keys.agc.pkcs12.b64=
agw.connectivity.signature.ds.keys.agc.pkcs12.password=changeit
agw.connectivity.signature.ds.keys.agc.pkcs12.alias=agc-signing-key

agw.connectivity.signature.ds.keys.psp1.pkcs12.path=pki/demo/provider-signing-keystore.p12
# agw.connectivity.signature.ds.keys.psp1.pkcs12.b64=
agw.connectivity.signature.ds.keys.psp1.pkcs12.password=changeit
agw.connectivity.signature.ds.keys.psp1.pkcs12.alias=provider-signing-key
# Optional verification-only mode:
# agw.connectivity.signature.ds.keys.psp1.certificate.path=pki/demo/provider-signing.crt
# agw.connectivity.signature.ds.keys.psp1.certificate.b64=

agw.connectivity.signature.ds.trust.crl.path=pki/demo/demo-ca.crl
# agw.connectivity.signature.ds.trust.crl.b64=

agw.connectivity.signature.inbound.validation.endpoints.common.matcher=ALL
agw.connectivity.signature.inbound.validation.endpoints.common.algorithm=ecdsa-p256-sha256
agw.connectivity.signature.inbound.validation.endpoints.common.digest-algorithm=sha256
agw.connectivity.signature.inbound.validation.endpoints.common.fail-fast=false
agw.connectivity.signature.inbound.validation.endpoints.common.fields=header:content-digest,header:content-length,header:content-type,header:requesting-agent,header:request-id,header:request-timestamp,header:method,header:path
agw.connectivity.signature.inbound.validation.endpoints.common.reject-on-failure=true

agw.connectivity.signature.inbound.validation.endpoints.deans-inbound.matcher=POST /v1/deans-bulks
agw.connectivity.signature.inbound.validation.endpoints.deans-inbound.algorithm=ecdsa-p256-sha256
agw.connectivity.signature.inbound.validation.endpoints.deans-inbound.digest-algorithm=sha256
agw.connectivity.signature.inbound.validation.endpoints.deans-inbound.fail-fast=true
agw.connectivity.signature.inbound.validation.endpoints.deans-inbound.fields=header:content-digest,header:content-length,header:content-type,header:requesting-agent,header:request-id,header:request-timestamp,header:method,header:path
agw.connectivity.signature.inbound.validation.endpoints.deans-inbound.reject-on-failure=true

agw.connectivity.signature.inbound.generation.endpoints.common.matcher=ALL
agw.connectivity.signature.inbound.generation.endpoints.common.signature-label=sig
agw.connectivity.signature.inbound.generation.endpoints.common.key-id=agc
agw.connectivity.signature.inbound.generation.endpoints.common.algorithm=ecdsa-p256-sha256
agw.connectivity.signature.inbound.generation.endpoints.common.digest-algorithm=sha256
agw.connectivity.signature.inbound.generation.endpoints.common.fields=header:content-digest,header:content-length,header:content-type,header:response-timestamp,@status,signature;req,request-id;req

agw.connectivity.signature.outbound.validation.endpoints.payment-provider-response.matcher=ALL
agw.connectivity.signature.outbound.validation.endpoints.payment-provider-response.algorithm=ecdsa-p256-sha256
agw.connectivity.signature.outbound.validation.endpoints.payment-provider-response.digest-algorithm=sha256
agw.connectivity.signature.outbound.validation.endpoints.payment-provider-response.fail-fast=true
agw.connectivity.signature.outbound.validation.endpoints.payment-provider-response.fields=header:content-digest,header:content-length,header:content-type,header:response-timestamp,@status,signature;req,request-id;req
agw.connectivity.signature.outbound.validation.endpoints.payment-provider-response.reject-on-failure=true

agw.connectivity.signature.outbound.generation.endpoints.common-outbound.matcher=ALL
agw.connectivity.signature.outbound.generation.endpoints.common-outbound.signature-label=sig
agw.connectivity.signature.outbound.generation.endpoints.common-outbound.key-id=agc
agw.connectivity.signature.outbound.generation.endpoints.common-outbound.algorithm=ecdsa-p256-sha256
agw.connectivity.signature.outbound.generation.endpoints.common-outbound.digest-algorithm=sha256
agw.connectivity.signature.outbound.generation.endpoints.common-outbound.fields=header:content-digest,header:content-length,header:content-type,header:requesting-agent,header:request-id,header:request-timestamp,header:method,header:path

agw.connectivity.signature.outbound.generation.endpoints.deans-outbound.matcher=POST /v1/deans-bulks
agw.connectivity.signature.outbound.generation.endpoints.deans-outbound.signature-label=sig
agw.connectivity.signature.outbound.generation.endpoints.deans-outbound.key-id=agc
agw.connectivity.signature.outbound.generation.endpoints.deans-outbound.algorithm=ecdsa-p256-sha256
agw.connectivity.signature.outbound.generation.endpoints.deans-outbound.digest-algorithm=sha256
agw.connectivity.signature.outbound.generation.endpoints.deans-outbound.fields=header:content-digest,header:content-length,header:content-type,header:requesting-agent,header:request-id,header:request-timestamp,header:method,header:path

# Global Kafka platform settings shared by legal-archiving producers and future consumers.
agw.connectivity.kafka.enabled=false
agw.connectivity.kafka.producers-enabled=true
agw.connectivity.kafka.consumers-enabled=true
kafka.bootstrap.servers=localhost:9092
kafka.client.id=quarkus-service
quarkus.kafka.devservices.enabled=false

# Feature-specific legal-archiving settings.
agw.connectivity.features.legal-archiving.enabled=true
agw.connectivity.features.legal-archiving.inbound.methods.GET.decision=SKIP
agw.connectivity.features.legal-archiving.inbound.methods.GET.override-paths=/toto
agw.connectivity.features.legal-archiving.inbound.methods.POST.decision=ARCHIVE
agw.connectivity.features.legal-archiving.inbound.methods.POST.override-paths=/lookups/deans
agw.connectivity.features.legal-archiving.inbound.methods.PUT.decision=ARCHIVE
agw.connectivity.features.legal-archiving.outbound.methods.GET.decision=SKIP
agw.connectivity.features.legal-archiving.outbound.methods.GET.override-paths=/toto
agw.connectivity.features.legal-archiving.outbound.methods.POST.decision=ARCHIVE
agw.connectivity.features.legal-archiving.outbound.methods.POST.override-paths=/lookups/deans
agw.connectivity.features.legal-archiving.outbound.methods.PUT.decision=ARCHIVE
agw.connectivity.features.legal-archiving.topic=desp-agc-legal-archive
agw.connectivity.features.legal-archiving.producer-client-id-suffix=legal-archiving
# Optional dedicated Kafka connection for legal archiving.
# When left unset, legal archiving inherits the shared AGR Kafka connection above.
# agw.connectivity.features.legal-archiving.kafka.bootstrap.servers=localhost:9093
# agw.connectivity.features.legal-archiving.kafka.security.protocol=SASL_SSL
# agw.connectivity.features.legal-archiving.kafka.sasl.mechanism=PLAIN
# agw.connectivity.features.legal-archiving.kafka.sasl.jaas.config=org.apache.kafka.common.security.plain.PlainLoginModule required username="legal-archiving" password="secret";
agw.connectivity.features.legal-archiving.worker.pool-size=4
agw.connectivity.features.legal-archiving.worker.queue-size=500
agw.connectivity.features.legal-archiving.worker.shutdown-timeout=10S
agw.connectivity.features.legal-archiving.producer.acks=all
agw.connectivity.features.legal-archiving.producer.retries=3
agw.connectivity.features.legal-archiving.producer.request-timeout-ms=15000
agw.connectivity.features.legal-archiving.producer.enable-idempotence=true
